{% extends 'base.html' %}

{% block title %}Graph Creator – NotesForPro{% endblock %}

{% block content %}

<div class="container mx-auto px-4 py-8 lg:py-12 max-w-7xl">
  <!-- Header -->
  <div class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent tracking-tight">
      Graph Creator
    </h1>
    <p class="mt-3 text-lg text-gray-400">
      Create beautiful interactive charts • Upload CSV or paste data • Dark mode optimized
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
    <!-- Left Panel – Controls -->
    <div class="lg:col-span-1">
      <div class="bg-gray-900/70 backdrop-blur-xl border border-cyan-900/50 rounded-2xl p-6 shadow-2xl sticky top-6">
        <form id="graph-form" class="space-y-6">

          <!-- Chart Type -->
          <div>
            <label class="block text-sm font-medium text-cyan-300 mb-2">Chart Type</label>
            <select name="plot_type" class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all">
              <option value="line">Line Chart</option>
              <option value="bar">Bar Chart</option>
              <option value="scatter">Scatter Plot</option>
              <option value="pie">Pie Chart</option>
              <option value="surface3d">3D Surface</option>
              <option value="scatter3d">3D Scatter</option>
            </select>
          </div>

          <!-- Title -->
          <div>
            <label class="block text-sm font-medium text-cyan-300 mb-2">Graph Title</label>
            <input type="text" name="title" value="My Analysis" class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all">
          </div>

          <!-- Axis Labels -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-cyan-300 mb-2">X-Axis Label</label>
              <input type="text" name="x_label" value="X Axis" class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-cyan-300 mb-2">Y-Axis Label</label>
              <input type="text" name="y_label" value="Y Axis" class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all">
            </div>
          </div>

          <!-- Legend -->
          <div>
            <label class="block text-sm font-medium text-cyan-300 mb-2">Show Legend</label>
            <select name="show_legend" class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all">
              <option value="true" selected>Yes</option>
              <option value="false">No</option>
            </select>
          </div>

          <!-- Data Input -->
          <div>
            <label class="block text-sm font-medium text-cyan-300 mb-2">Data Source</label>
            <div class="space-y-3">
              <input type="file" name="csv_file" accept=".csv" class="block w-full text-sm text-gray-400 file:mr-4 file:py-3 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-cyan-900/40 file:text-cyan-300 hover:file:bg-cyan-800/60 transition-all cursor-pointer">
              <textarea name="csv_text" rows="6" placeholder="Paste CSV here (with headers)&#10;Example:&#10;x,y,group,z&#10;1,10,A,5&#10;2,15,B,8..." class="w-full bg-gray-800/80 border border-gray-700 text-white rounded-xl px-4 py-3 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all resize-y"></textarea>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" id="generate-btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-cyan-500/30 disabled:opacity-50 disabled:cursor-not-allowed">
            Generate Graph
          </button>
        </form>
      </div>
    </div>

    <!-- Right Panel – Preview + Data Table -->
    <div class="lg:col-span-2 space-y-6">
      <!-- Graph Container -->
      <div class="bg-gray-900/70 backdrop-blur-xl border border-cyan-900/50 rounded-2xl p-6 shadow-2xl overflow-hidden">
        <div id="graph-result" class="w-full h-[500px] md:h-[600px] rounded-xl"></div>
      </div>

      <!-- Data Preview -->
      <div class="bg-gray-900/70 backdrop-blur-xl border border-cyan-900/50 rounded-2xl p-6 shadow-2xl">
        <h3 class="text-lg font-semibold text-cyan-300 mb-4">Data Preview (first 10 rows)</h3>
        <div id="df-preview" class="overflow-x-auto rounded-lg bg-gray-950/70 p-4 text-sm text-gray-300 max-h-64 overflow-y-auto">
          <p class="text-gray-500 italic">Generate a graph to see data preview...</p>
        </div>
      </div>

      <!-- Status / Error -->
      <div id="status-message" class="hidden p-4 rounded-xl text-center font-medium"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" crossorigin="anonymous" referrerpolicy="no-referrer" async></script>

<script>
// ────────────────────────────────────────────────
//   Wait for Plotly to be ready
// ────────────────────────────────────────────────
function waitForPlotly(callback, timeoutMs = 15000, intervalMs = 150) {
  let elapsed = 0;
  const check = setInterval(() => {
    elapsed += intervalMs;
    if (typeof Plotly !== 'undefined' && typeof Plotly.newPlot === 'function') {
      clearInterval(check);
      console.log('Plotly is ready');
      callback();
    } else if (elapsed >= timeoutMs) {
      clearInterval(check);
      showStatus('error', 'Graph library failed to load. Check your internet or try refreshing.');
    }
  }, intervalMs);
}

// ────────────────────────────────────────────────
//   Show status message
// ────────────────────────────────────────────────
function showStatus(type, message) {
  const el = document.getElementById('status-message');
  el.className = `p-4 rounded-xl text-center font-medium ${
    type === 'error' ? 'bg-red-900/40 border border-red-600/50 text-red-300' :
    type === 'success' ? 'bg-green-900/40 border border-green-600/50 text-green-300' :
    'bg-gray-800/60 text-gray-300'
  }`;
  el.textContent = message;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 8000);
}

// ────────────────────────────────────────────────
//   Form submission
// ────────────────────────────────────────────────
document.getElementById('graph-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    const response = await fetch("{% url 'graph:generate' %}", {
      method: 'POST',
      body: formData,
      headers: { 'X-CSRFToken': '{{ csrf_token }}' },
      credentials: 'same-origin'
    });

    if (!response.ok) {
      throw new Error(`Server responded with ${response.status}`);
    }

    const data = await response.json();

    if (data.success) {
      waitForPlotly(() => {
        const graphDiv = document.getElementById('graph-result');
        graphDiv.innerHTML = '';

        const figure = JSON.parse(data.graph_json);

        Plotly.newPlot(graphDiv, figure.data, figure.layout, {
          responsive: true,
          displayModeBar: true,
          modeBarButtonsToRemove: ['sendDataToCloud', 'lasso2d', 'select2d']
        });

        document.getElementById('df-preview').innerHTML = data.dataframe_preview || '<p class="text-gray-500">No preview available</p>';
        showStatus('success', 'Graph generated successfully!');
      });
    } else {
      showStatus('error', data.error || 'Something went wrong on the server.');
    }
  } catch (err) {
    console.error(err);
    showStatus('error', 'Failed to connect: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Graph';
  }
});
</script>

<style>
  /* Optional extra polish */
  select:focus, input:focus, textarea:focus {
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.25);
  }
  #graph-result .modebar {
    background: rgba(30, 41, 59, 0.9) !important;
  }
</style>

{% endblock %}
