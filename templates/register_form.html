<!-- register_form.html -->

<form id="registerForm" class="space-y-6">

{% csrf_token %}

<div class="space-y-5">

<!-- Username -->

<div>
<label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">
Username *
</label>

<input
type="text"
name="username"
id="username"
required
autocomplete="username"
placeholder="Choose a username"
class="w-full px-5 py-4 bg-gray-900/70 border border-gray-700 rounded-xl text-white
focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 transition-all"

>

</div>

<!-- Email -->

<div>
<label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">
Email (optional)
</label>

<input
type="email"
name="email"
id="email"
autocomplete="email"
placeholder="[your@email.com](mailto:your@email.com)"
class="w-full px-5 py-4 bg-gray-900/70 border border-gray-700 rounded-xl text-white
focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 transition-all"

>

</div>

<!-- Password -->

<div>
<label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">
Password *
</label>

<input
type="password"
name="password"
id="password"
required
autocomplete="new-password"
placeholder="Minimum 8 characters"
class="w-full px-5 py-4 bg-gray-900/70 border border-gray-700 rounded-xl text-white
focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 transition-all"

>

</div>

<!-- Confirm Password -->

<div>
<label for="password_confirm" class="block text-sm font-medium text-gray-300 mb-1.5">
Confirm Password *
</label>

<input
type="password"
name="password_confirm"
id="password_confirm"
required
autocomplete="new-password"
placeholder="Type password again"
class="w-full px-5 py-4 bg-gray-900/70 border border-gray-700 rounded-xl text-white
focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 transition-all"

>

</div>

</div>

<button
type="submit"
class="w-full py-5 bg-gradient-to-r from-cyan-600 to-blue-600
hover:from-cyan-500 hover:to-blue-500
text-white font-semibold text-xl rounded-xl shadow-lg
transform transition-all duration-200
hover:scale-[1.02] active:scale-[0.98]">

Create Account

</button>

</form>

<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

const password = document.getElementById("password").value
const confirm = document.getElementById("password_confirm").value

if(password !== confirm){
alert("❌ Passwords do not match")
return
}

const formData = new FormData(this)

const response = await fetch("/api/register/",{
method:"POST",
body:formData,
headers:{
"X-CSRFToken":document.querySelector("[name=csrfmiddlewaretoken]").value
}
})

const data = await response.json()

if(data.status === "success"){

alert("✅ Account created successfully!")

window.location.href="/login/"

}else{

let message="❌ Registration Error:\n\n"

for(const field in data.errors){
message += field + ": " + data.errors[field].join(", ") + "\n"
}

alert(message)

}

})

</script>
