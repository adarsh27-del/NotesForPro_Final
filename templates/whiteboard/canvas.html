{% extends 'base.html' %}

{% block title %}Whiteboard – NotesForPro{% endblock %}

{% block extra_head %}
  <!-- No jsPDF or PDF export anymore -->
{% endblock %}

{% block content %}

<div class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-black flex flex-col text-gray-100 overflow-hidden">

  <div class="bg-gray-900/95 backdrop-blur-xl border-b border-cyan-900/60 px-4 py-3 flex flex-wrap items-center gap-3 sm:gap-5 z-30 sticky top-0 shadow-xl">
    <h2 class="text-2xl font-extrabold bg-gradient-to-r from-cyan-400 to-teal-300 bg-clip-text text-transparent tracking-tight">
      Whiteboard
    </h2>

    <div class="flex items-center gap-2 flex-wrap">
      <button id="tool-pencil"  class="tool-btn active" title="Pencil">✏️</button>
      <button id="tool-eraser"  class="tool-btn" title="Eraser">🧼</button>
      <button id="tool-line"    class="tool-btn" title="Line">📏</button>
      <button id="tool-rect"    class="tool-btn" title="Rectangle">⬜</button>
      <button id="tool-circle"  class="tool-btn" title="Circle">⚪</button>
      <button id="tool-arrow"   class="tool-btn" title="Arrow">↗️</button>
      <button id="tool-text"    class="tool-btn" title="Text">Aa</button>
      <button id="tool-image"   class="tool-btn" title="Insert Image">🖼️</button>
    </div>

    <div class="flex items-center gap-4 flex-grow justify-center sm:justify-start">
      <div class="flex items-center gap-2">
        <label class="text-sm font-medium text-gray-300">Color</label>
        <input type="color" id="drawColor" value="#00D4FF" class="w-9 h-9 rounded-full cursor-pointer border-2 border-cyan-600/60 shadow-md">
      </div>
      <div class="flex items-center gap-2">
        <label class="text-sm font-medium text-gray-300">Size</label>
        <input type="range" id="brushSize" min="1" max="60" value="6" step="1" class="w-36 accent-cyan-500">
        <span id="sizeValue" class="text-sm font-semibold text-cyan-300 min-w-10 text-center">6</span>
      </div>
      <button id="toggleGrid" class="tool-btn text-sm px-4 py-1.5" title="Toggle Grid">Grid</button>
    </div>

    <div class="flex gap-2 ml-auto items-center flex-wrap">
      <button id="btnUndo"   class="tool-btn" title="Undo">↺</button>
      <button id="btnRedo"   class="tool-btn" title="Redo">↻</button>
      <button id="btnClear"  class="tool-btn text-red-400 hover:text-red-300" title="Clear All">🗑️</button>
      <button id="btnSavePng" class="px-4 py-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 rounded-xl font-medium shadow-lg hover:shadow-teal-500/40 transform hover:scale-105 transition-all">
        PNG
      </button>
      <button id="btnSaveJpg" class="px-4 py-2 bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 rounded-xl font-medium shadow-lg hover:shadow-orange-500/40 transform hover:scale-105 transition-all">
        JPG
      </button>
    </div>
  </div>

  <div class="flex-1 relative overflow-hidden">
    <canvas id="canvasBoard" class="absolute inset-0 w-full h-full touch-none"></canvas>
  </div>

</div>

<style>
  .tool-btn {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(31,41,55,0.7); border-radius: 12px;
    color: #e5e7eb; transition: all 0.18s ease;
    border: 1px solid rgba(6,182,212,0.18);
    font-size: 1.75rem; line-height: 1;
  }
  .tool-btn:hover { background: rgba(31,41,55,0.95); color: #67e8f9; transform: scale(1.08); box-shadow: 0 0 14px rgba(6,182,212,0.35); }
  .tool-btn.active { background: rgba(6,182,212,0.48); color: #a5f3fc; box-shadow: 0 0 0 3.5px rgba(6,182,212,0.4); }

  canvas { cursor: crosshair; touch-action: none; background: #0f172a; }
  canvas.text-mode { cursor: text; }
  canvas.move-mode, canvas.resize-mode { cursor: move !important; }

  #textInput {
    position: absolute;
    background: rgba(17,24,39,0.92);
    color: white;
    border: 2px solid #22d3ee;
    padding: 6px 12px;
    border-radius: 8px;
    outline: none;
    font-family: system-ui, sans-serif;
    box-shadow: 0 4px 24px rgba(34,211,238,0.4);
    min-width: 160px;
    z-index: 300;
  }
</style>

<script>
// ────────────────────────────────────────────────
// Whiteboard – NotesForPro – PDF export removed
// Brush size updates live on slider move
// ────────────────────────────────────────────────

const canvas = document.getElementById('canvasBoard');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

const drawColor = document.getElementById('drawColor');
const brushSize = document.getElementById('brushSize');
const sizeValue = document.getElementById('sizeValue');

let currentTool = 'pencil';
let isDrawing = false;
let startX, startY, lastX, lastY;
let currentShape = null;

let objects = [];
let undoStack = [];
let redoStack = [];
let gridVisible = false;

let selectedObj = null;
let dragOffsetX = 0, dragOffsetY = 0;
let resizeHandle = null;
let textInput = null;

// ─── Canvas resize ───────────────────────────────────────
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  redraw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Live brush size update ──────────────────────────────
brushSize.addEventListener('input', () => {
  sizeValue.textContent = brushSize.value;
});

// ─── State management ────────────────────────────────────
function saveState() {
  redoStack = [];
  undoStack.push(JSON.parse(JSON.stringify(objects)));
  if (undoStack.length > 30) undoStack.shift();
}

function restoreState(saved) {
  objects = JSON.parse(JSON.stringify(saved));
  redraw();
}

function redraw() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  objects.forEach(obj => {
    if (obj.type === 'shape' || obj.type === 'path') {
      if (!obj.points || obj.points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
      ctx.lineWidth = obj.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = obj.strokeStyle;
      ctx.globalCompositeOperation = obj.composite || 'source-over';
      ctx.stroke();
    }
    else if (obj.type === 'text') {
      ctx.font = `${obj.fontSize}px system-ui, sans-serif`;
      ctx.fillStyle = obj.color;
      ctx.fillText(obj.content, obj.x, obj.y);
      if (obj === selectedObj) drawSelectionBox(obj);
    }
    else if (obj.type === 'image' && obj.img?.complete) {
      ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
      if (obj === selectedObj) drawSelectionBox(obj);
    }
  });

  if (gridVisible) drawGrid();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(148,163,184,0.08)';
  ctx.lineWidth = 1;
  const size = 40;
  for (let x = 0; x < canvas.width; x += size) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += size) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function drawSelectionBox(obj) {
  ctx.strokeStyle = '#22d3ee';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 3]);
  ctx.strokeRect(obj.x - 8, obj.y - 8, obj.w + 16, obj.h + 16);
  ctx.setLineDash([]);

  const hs = 12;
  ctx.fillStyle = '#22d3ee';
  ctx.fillRect(obj.x - hs/2, obj.y - hs/2, hs, hs);
  ctx.fillRect(obj.x + obj.w - hs/2, obj.y - hs/2, hs, hs);
  ctx.fillRect(obj.x - hs/2, obj.y + obj.h - hs/2, hs, hs);
  ctx.fillRect(obj.x + obj.w - hs/2, obj.y + obj.h - hs/2, hs, hs);
}

// ─── Position helpers ────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (cx - r.left) * (canvas.width / r.width),
    y: (cy - r.top)  * (canvas.height / r.height)
  };
}

// ─── Hit detection ───────────────────────────────────────
function hitTest(x, y) {
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    if ((o.type === 'text' || o.type === 'image') &&
        x >= o.x && x <= o.x + o.w && y >= o.y && y <= o.y + o.h) {
      return { obj: o, index: i };
    }
  }
  return null;
}

function hitResizeHandle(obj, x, y) {
  const hs = 14;
  const corners = [
    {name:'nw', x:obj.x, y:obj.y},
    {name:'ne', x:obj.x+obj.w, y:obj.y},
    {name:'sw', x:obj.x, y:obj.y+obj.h},
    {name:'se', x:obj.x+obj.w, y:obj.y+obj.h},
  ];
  for (const c of corners) {
    if (Math.hypot(x - c.x, y - c.y) < hs) return c.name;
  }
  return null;
}

// ─── Drawing start ───────────────────────────────────────
function start(e) {
  e.preventDefault();
  const pos = getPos(e);
  startX = lastX = pos.x;
  startY = lastY = pos.y;

  // Handle selection/move/resize
  if (['text','image'].includes(currentTool)) {
    const hit = hitTest(pos.x, pos.y);
    if (hit) {
      selectedObj = hit.obj;
      dragOffsetX = pos.x - hit.obj.x;
      dragOffsetY = pos.y - hit.obj.y;
      resizeHandle = hitResizeHandle(hit.obj, pos.x, pos.y);
      canvas.classList.add(resizeHandle ? 'resize-mode' : 'move-mode');
      redraw();
      return;
    }
    selectedObj = null;
    redraw();
  }

  if (currentTool === 'text') {
    createTextAt(pos.x, pos.y);
    return;
  }

  if (currentTool === 'image') return;

  // Start drawing
  if (['pencil','eraser','line','rect','circle','arrow'].includes(currentTool)) {
    saveState();
    isDrawing = true;

    currentShape = {
      type: 'shape',
      tool: currentTool,
      points: [{x: pos.x, y: pos.y}],
      lineWidth: Number(brushSize.value),
      strokeStyle: currentTool === 'eraser' ? '#000000' : drawColor.value,
      composite: currentTool === 'eraser' ? 'destination-out' : 'source-over'
    };

    if (currentTool === 'pencil' || currentTool === 'eraser') {
      objects.push(currentShape);
    }
  }
}

// ─── Drawing move ────────────────────────────────────────
function move(e) {
  e.preventDefault();
  const pos = getPos(e);

  // Move or resize selected object
  if (selectedObj && (canvas.classList.contains('move-mode') || canvas.classList.contains('resize-mode'))) {
    if (resizeHandle) {
      let nx = selectedObj.x, ny = selectedObj.y;
      let nw = selectedObj.w, nh = selectedObj.h;

      if (resizeHandle.includes('e')) nw = Math.max(40, pos.x - selectedObj.x);
      if (resizeHandle.includes('s')) nh = Math.max(40, pos.y - selectedObj.y);
      if (resizeHandle.includes('w')) { nw = Math.max(40, selectedObj.x + selectedObj.w - pos.x); nx = pos.x; }
      if (resizeHandle.includes('n')) { nh = Math.max(40, selectedObj.y + selectedObj.h - pos.y); ny = pos.y; }

      selectedObj.x = nx;
      selectedObj.y = ny;
      selectedObj.w = nw;
      selectedObj.h = nh;

      if (selectedObj.type === 'text') {
        selectedObj.fontSize = Math.round(nh * 0.72);
      }
    } else {
      selectedObj.x = pos.x - dragOffsetX;
      selectedObj.y = pos.y - dragOffsetY;
    }
    redraw();
    return;
  }

  if (!isDrawing || !currentShape) return;

  if (currentTool === 'pencil' || currentTool === 'eraser') {
    currentShape.points.push({x: pos.x, y: pos.y});

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.lineWidth = Number(brushSize.value);           // live size
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = currentTool === 'eraser' ? '#000000' : drawColor.value;
    ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.stroke();

    lastX = pos.x;
    lastY = pos.y;
  }
}

// ─── Drawing end ─────────────────────────────────────────
function end(e) {
  if (!isDrawing) {
    canvas.classList.remove('move-mode','resize-mode');
    resizeHandle = null;
    return;
  }

  isDrawing = false;
  canvas.classList.remove('move-mode','resize-mode');
  resizeHandle = null;

  const pos = getPos(e);

  // Finalize shapes
  if (currentShape && ['line','rect','circle','arrow'].includes(currentTool)) {
    const dx = pos.x - startX;
    const dy = pos.y - startY;

    if (currentTool === 'line') {
      currentShape.points = [{x: startX, y: startY}, {x: pos.x, y: pos.y}];
    }
    else if (currentTool === 'rect') {
      currentShape.points = [
        {x: startX, y: startY},
        {x: startX + dx, y: startY},
        {x: startX + dx, y: startY + dy},
        {x: startX, y: startY + dy},
        {x: startX, y: startY}
      ];
    }
    else if (currentTool === 'circle') {
      const radius = Math.hypot(dx, dy);
      currentShape.points = [];
      for (let a = 0; a <= Math.PI*2; a += 0.08) {
        currentShape.points.push({
          x: startX + Math.cos(a) * radius,
          y: startY + Math.sin(a) * radius
        });
      }
    }
    else if (currentTool === 'arrow') {
      const angle = Math.atan2(dy, dx);
      currentShape.points = [
        {x: startX, y: startY},
        {x: pos.x, y: pos.y},
        {x: pos.x - 20 * Math.cos(angle - Math.PI/6), y: pos.y - 20 * Math.sin(angle - Math.PI/6)},
        {x: pos.x, y: pos.y},
        {x: pos.x - 20 * Math.cos(angle + Math.PI/6), y: pos.y - 20 * Math.sin(angle + Math.PI/6)}
      ];
    }

    objects.push(currentShape);
  }

  currentShape = null;
  saveState();
  redraw();
}

// ─── Text creation ───────────────────────────────────────
function createTextAt(x, y) {
  if (textInput) textInput.remove();

  const rect = canvas.getBoundingClientRect();
  textInput = document.createElement('input');
  textInput.type = 'text';
  textInput.style.left = `${x + rect.left}px`;
  textInput.style.top  = `${y + rect.top - 20}px`;
  textInput.style.fontSize = `${Number(brushSize.value) * 1.9}px`;  // live size
  textInput.style.color = drawColor.value;
  textInput.style.minWidth = '180px';
  textInput.style.padding = '6px 12px';
  document.body.appendChild(textInput);
  textInput.focus();

  textInput.onkeydown = e => { if (e.key === 'Enter') finish(); };
  textInput.onblur = finish;

  function finish() {
    if (!textInput?.value?.trim()) {
      textInput.remove();
      textInput = null;
      return;
    }

    const fs = parseFloat(textInput.style.fontSize);
    const temp = document.createElement('canvas').getContext('2d');
    temp.font = `${fs}px system-ui, sans-serif`;
    const w = temp.measureText(textInput.value).width + 32;
    const h = fs * 1.6;

    objects.push({
      type: 'text',
      x, y: y + fs * 0.35,
      w, h,
      content: textInput.value,
      fontSize: fs,
      color: drawColor.value
    });

    saveState();
    redraw();
    textInput.remove();
    textInput = null;
  }
}

// ─── Image insert ────────────────────────────────────────
document.getElementById('tool-image').onclick = () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 1000 / Math.max(img.width, img.height));
        const w = img.width * scale;
        const h = img.height * scale;
        objects.push({
          type: 'image',
          x: 140,
          y: 140,
          w, h,
          img,
          src: ev.target.result
        });
        saveState();
        redraw();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
};

// ─── Tool selection ──────────────────────────────────────
function setTool(tool, btnId) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btnId)?.classList.add('active');

  canvas.classList.toggle('text-mode', tool === 'text');

  if (!['text','image'].includes(tool)) {
    selectedObj = null;
  }
  redraw();
}

document.getElementById('tool-pencil').onclick  = () => setTool('pencil', 'tool-pencil');
document.getElementById('tool-eraser').onclick  = () => setTool('eraser', 'tool-eraser');
document.getElementById('tool-line').onclick    = () => setTool('line',   'tool-line');
document.getElementById('tool-rect').onclick    = () => setTool('rect',   'tool-rect');
document.getElementById('tool-circle').onclick  = () => setTool('circle', 'tool-circle');
document.getElementById('tool-arrow').onclick   = () => setTool('arrow',  'tool-arrow');
document.getElementById('tool-text').onclick    = () => setTool('text',   'tool-text');

// ─── Events ──────────────────────────────────────────────
canvas.addEventListener('pointerdown', start);
canvas.addEventListener('pointermove', move);
canvas.addEventListener('pointerup',   end);
canvas.addEventListener('pointerout',  end);

// ─── Action buttons ──────────────────────────────────────
document.getElementById('btnUndo').onclick = () => {
  if (undoStack.length > 1) {
    redoStack.push(objects);
    restoreState(undoStack.pop());
  }
};

document.getElementById('btnRedo').onclick = () => {
  if (redoStack.length > 0) {
    undoStack.push(objects);
    restoreState(redoStack.pop());
  }
};

document.getElementById('btnClear').onclick = () => {
  if (confirm('Clear whiteboard?')) {
    objects = [];
    undoStack = [];
    redoStack = [];
    selectedObj = null;
    redraw();
  }
};

document.getElementById('toggleGrid').onclick = () => {
  gridVisible = !gridVisible;
  redraw();
};

document.getElementById('btnSavePng').onclick = () => {
  const a = document.createElement('a');
  a.download = `NotesForPro_${new Date().toISOString().slice(0,10)}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
};

document.getElementById('btnSaveJpg').onclick = () => {
  const a = document.createElement('a');
  a.download = `NotesForPro_${new Date().toISOString().slice(0,10)}.jpg`;
  a.href = canvas.toDataURL('image/jpeg', 0.94);
  a.click();
};

// ─── Initial setup ───────────────────────────────────────
setTool('pencil', 'tool-pencil');
saveState();

</script>

{% endblock %}
